steps:
  - name: prepare_sample
    label: Prepare command-only sample
    type: command
    timeoutSeconds: 30
    run: sleep 1 && mkdir -p ".pi/flow/tmp/{{ .RunID }}" && printf "command smoke for {{ .RunID }}\n" > ".pi/flow/tmp/{{ .RunID }}/input.txt" && test -s ".pi/flow/tmp/{{ .RunID }}/input.txt"

  - name: write_artifact
    label: Write sample artifact
    type: command
    timeoutSeconds: 30
    run: sleep 1 && printf "# Command smoke flow\n\nRun: {{ .RunID }}\n" > "{{ .RunDir }}/COMMAND_SMOKE.md" && test -s "{{ .RunDir }}/COMMAND_SMOKE.md"

  - name: validate_artifact
    label: Validate sample artifact
    type: command
    timeoutSeconds: 30
    run: sleep 1 && grep -q "Command smoke flow" "{{ .RunDir }}/COMMAND_SMOKE.md" && grep -q "command smoke" ".pi/flow/tmp/{{ .RunID }}/input.txt"

  - name: cleanup_sample
    label: Clean up command-only sample
    type: command
    timeoutSeconds: 30
    run: sleep 1 && rm -rf ".pi/flow/tmp/{{ .RunID }}" && test ! -e ".pi/flow/tmp/{{ .RunID }}"
