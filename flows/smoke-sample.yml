steps:
  - name: prepare_sample
    label: Prepare sample workspace
    type: command
    timeoutSeconds: 30
    run: mkdir -p ".pi/flow/tmp/{{ .RunID }}" && printf "sample input for {{ .RunID }}\n" > ".pi/flow/tmp/{{ .RunID }}/input.txt" && test -s ".pi/flow/tmp/{{ .RunID }}/input.txt"

  - name: agent_summary
    label: Ask agent to summarize sample input
    type: agent
    tools: read,write
    timeoutSeconds: 180
    prompt: prompts/SMOKE_AGENT.md

  - name: validate_agent_output
    label: Validate sample output
    type: command
    timeoutSeconds: 30
    run: test -s "{{ .RunDir }}/SMOKE_AGENT.md" && grep -q "Smoke sample flow" "{{ .RunDir }}/SMOKE_AGENT.md"

  - name: cleanup_sample
    label: Clean up sample workspace
    type: command
    timeoutSeconds: 30
    run: rm -rf ".pi/flow/tmp/{{ .RunID }}" && test ! -e ".pi/flow/tmp/{{ .RunID }}"
